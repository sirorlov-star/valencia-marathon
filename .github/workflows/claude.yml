name: Claude

# Trigger when you mention @claude in an issue or a comment.
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review_comment:
    types: [created]

# Only allow the trigger to run when @claude is present.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude') || contains(github.event.issue.body, '@claude')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Opus for plan reasoning; drop to sonnet to save tokens if you like.
          claude_args: "--model claude-opus-4-8 --max-turns 15"
        env:
          # Made available to sync_intervals.py when Claude runs it.
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
